<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Safe Eye Solutions | CCTV & Security</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{

font-family:'Manrope',sans-serif;

background:#070b14;

color:white;

overflow-x:hidden;

}

a{

text-decoration:none;

}

header{

position:fixed;

top:0;

width:100%;

display:flex;

justify-content:space-between;

align-items:center;

padding:22px 8%;

background:rgba(7,11,20,.65);

backdrop-filter:blur(18px);

z-index:999;

border-bottom:1px solid rgba(255,255,255,.08);

}

.logo{

font-family:'Space Grotesk',sans-serif;

font-size:30px;

font-weight:700;

letter-spacing:2px;

}

nav{

display:flex;

gap:35px;

}

nav a{

color:white;

font-weight:500;

opacity:.85;

transition:.3s;

}

nav a:hover{

color:#38bdf8;

}

.hero{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

padding:120px 30px;

background:

linear-gradient(rgba(7,11,20,.82),rgba(7,11,20,.88)),

url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1800&q=80");

background-size:cover;

background-position:center;

}

.hero-content{

max-width:900px;

}

.tag{

display:inline-block;

padding:10px 22px;

border:1px solid rgba(255,255,255,.12);

background:rgba(255,255,255,.05);

border-radius:50px;

font-size:14px;

letter-spacing:2px;

margin-bottom:30px;

}

.hero h1{

font-family:'Space Grotesk',sans-serif;

font-size:72px;

line-height:1.05;

margin-bottom:28px;

}

.hero p{

font-size:22px;

line-height:1.8;

color:#cfd8e3;

max-width:760px;

margin:auto;

}

.buttons{

margin-top:45px;

display:flex;

justify-content:center;

gap:18px;

flex-wrap:wrap;

}

.btn{

padding:18px 34px;

border-radius:60px;

font-weight:700;

transition:.35s;

}

.primary{

background:#2563eb;

color:white;

}

.primary:hover{

transform:translateY(-5px);

background:#1d4ed8;

}

.secondary{

border:2px solid rgba(255,255,255,.15);

color:white;

background:rgba(255,255,255,.05);

backdrop-filter:blur(12px);

}

.secondary:hover{

transform:translateY(-5px);

}

.stats{

margin-top:70px;

display:flex;

justify-content:center;

gap:70px;

flex-wrap:wrap;

}

.stat h2{

font-size:52px;

font-family:'Space Grotesk';

color:#38bdf8;

}

.stat span{

color:#c8d0dc;

font-size:15px;

}

section{

padding:100px 8%;

}

.title{

font-family:'Space Grotesk';

font-size:46px;

text-align:center;

margin-bottom:60px;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

gap:28px;

}

.card{

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(18px);

padding:35px;

border-radius:24px;

transition:.35s;

}

.card:hover{

transform:translateY(-10px);

border-color:#38bdf8;

}

.card h3{

font-family:'Space Grotesk';

margin-bottom:15px;

font-size:24px;

}

.card p{

line-height:1.7;

color:#cfd8e3;

}

@media(max-width:768px){

nav{

display:none;

}

.hero h1{

font-size:46px;

}

.hero p{

font-size:18px;

}

.title{

font-size:34px;

}

}

</style>

</head>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Safe Eye Solutions</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#05070d;
font-family:Poppins,sans-serif;
color:white;
overflow-x:hidden;
}

header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:rgba(0,0,0,.45);
backdrop-filter:blur(12px);
z-index:1000;
}

.logo{
font-family:"Space Grotesk";
font-size:28px;
font-weight:700;
letter-spacing:1px;
}

nav a{
text-decoration:none;
color:white;
margin-left:30px;
font-size:15px;
}

.hero{

height:100vh;

background:
linear-gradient(rgba(0,0,0,.72),rgba(0,0,0,.80)),
url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1800&q=80");

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

text-align:center;

padding:30px;

}

.hero h1{

font-family:"Space Grotesk";

font-size:65px;

line-height:1.05;

margin-bottom:25px;

}

.hero p{

max-width:700px;

margin:auto;

font-size:20px;

color:#d4d4d4;

line-height:1.7;

}

.buttons{

margin-top:45px;

}

.btn{

display:inline-block;

padding:16px 34px;

border-radius:50px;

text-decoration:none;

font-weight:600;

margin:10px;

transition:.35s;

}

.primary{

background:#0077ff;

color:white;

}

.secondary{

border:2px solid white;

color:white;

}

.btn:hover{

transform:translateY(-6px);

}

.stats{

margin-top:70px;

display:flex;

justify-content:center;

gap:50px;

flex-wrap:wrap;

}

.box h2{

font-size:42px;

color:#00bfff;

}

.box p{

font-size:15px;

color:#bdbdbd;

}

@media(max-width:768px){

header{

padding:18px;

}

nav{

display:none;

}

.hero h1{

font-size:42px;

}

.hero p{

font-size:16px;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

SAFE EYE

</div>

<nav>

<a href="#">Home</a>

<a href="#">Services</a>

<a href="#">Projects</a>

<a href="#">Contact</a>

</nav>

</header>

<section class="hero">

<div>

<h1>

Beyond Surveillance.<br>

Built on Trust.

</h1>

<p>

Premium CCTV & Security Solutions for Homes, Businesses & Industries.

Trusted by over 350+ happy customers across Mangalore.

</p>

<div class="buttons">

<a class="btn primary"

href="https://wa.me/917259356642">

Book Free Site Survey

</a>

<a class="btn secondary"

href="tel:+919902742523">

Call Now

</a>

</div>

<div class="stats">

<div class="box">

<h2>350+</h2>

<p>Happy Customers</p>

</div>

<div class="box">

<h2>3</h2>

<p>Premium Brands</p>

</div>

<div class="box">

<h2>24×7</h2>

<p>Support</p>

</div>

</div>

</div>

</section>

</body>
</html>
